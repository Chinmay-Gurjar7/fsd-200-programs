<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Loading Animations</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d1a;color:#fff;padding:3rem 1rem;}
    h1{text-align:center;font-size:2.2rem;font-weight:800;margin-bottom:.5rem;}
    h1 span{background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .subtitle{text-align:center;color:#666;margin-bottom:3rem;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;max-width:900px;margin:0 auto;}
    .card{background:#16162a;border:1px solid rgba(108,99,255,.2);border-radius:20px;padding:2.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;transition:all .3s;}
    .card:hover{border-color:#6c63ff;transform:translateY(-5px);box-shadow:0 15px 40px rgba(108,99,255,.2);}
    .card-label{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#666;}
    .loader-wrap{height:60px;display:flex;align-items:center;justify-content:center;}

    /* 1. Spinner */
    .spinner{width:44px;height:44px;border:4px solid rgba(108,99,255,.2);border-top-color:#6c63ff;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* 2. Pulse */
    .pulse{width:44px;height:44px;background:#6c63ff;border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.5;}}

    /* 3. Dots */
    .dots{display:flex;gap:8px;}
    .dots span{width:12px;height:12px;background:#6c63ff;border-radius:50%;animation:dotBounce 1.2s ease-in-out infinite;}
    .dots span:nth-child(2){animation-delay:.2s;background:#ff6584;}
    .dots span:nth-child(3){animation-delay:.4s;background:#43e97b;}
    @keyframes dotBounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}

    /* 4. Bars */
    .bars{display:flex;gap:5px;align-items:flex-end;height:44px;}
    .bars span{width:8px;background:linear-gradient(to top,#6c63ff,#ff6584);border-radius:4px;animation:barGrow 1s ease-in-out infinite;}
    .bars span:nth-child(1){animation-delay:0s;}
    .bars span:nth-child(2){animation-delay:.15s;}
    .bars span:nth-child(3){animation-delay:.3s;}
    .bars span:nth-child(4){animation-delay:.45s;}
    .bars span:nth-child(5){animation-delay:.6s;}
    @keyframes barGrow{0%,100%{height:10px;}50%{height:44px;}}

    /* 5. Ring */
    .ring{width:44px;height:44px;position:relative;}
    .ring::before,.ring::after{content:'';position:absolute;border-radius:50%;border:4px solid transparent;}
    .ring::before{inset:0;border-top-color:#6c63ff;animation:spin .8s linear infinite;}
    .ring::after{inset:6px;border-top-color:#ff6584;animation:spin 1.2s linear infinite reverse;}

    /* 6. Bounce */
    .bounce{display:flex;gap:8px;align-items:center;}
    .bounce span{width:14px;height:14px;background:#6c63ff;border-radius:50%;animation:bounceAnim .8s ease-in-out infinite alternate;}
    .bounce span:nth-child(2){animation-delay:.15s;background:#ff6584;}
    .bounce span:nth-child(3){animation-delay:.3s;background:#43e97b;}
    @keyframes bounceAnim{from{transform:translateY(0);}to{transform:translateY(-20px);}}

    /* 7. Wave */
    .wave{display:flex;gap:4px;align-items:center;}
    .wave span{width:5px;height:30px;background:linear-gradient(to top,#6c63ff,#ff6584);border-radius:3px;animation:waveAnim 1s ease-in-out infinite;}
    .wave span:nth-child(1){animation-delay:0s;}
    .wave span:nth-child(2){animation-delay:.1s;}
    .wave span:nth-child(3){animation-delay:.2s;}
    .wave span:nth-child(4){animation-delay:.3s;}
    .wave span:nth-child(5){animation-delay:.4s;}
    .wave span:nth-child(6){animation-delay:.5s;}
    .wave span:nth-child(7){animation-delay:.4s;}
    .wave span:nth-child(8){animation-delay:.3s;}
    @keyframes waveAnim{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}

    /* 8. Skeleton */
    .skeleton{width:160px;}
    .skel-line{height:10px;background:linear-gradient(90deg,#1e1e3a 25%,#2a2a4a 50%,#1e1e3a 75%);background-size:200% 100%;border-radius:5px;margin-bottom:8px;animation:shimmer 1.5s infinite;}
    .skel-line:nth-child(1){width:100%;}
    .skel-line:nth-child(2){width:80%;}
    .skel-line:nth-child(3){width:60%;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    /* 9. Ripple */
    .ripple{width:44px;height:44px;position:relative;}
    .ripple span{position:absolute;inset:0;border:3px solid #6c63ff;border-radius:50%;animation:rippleAnim 1.5s ease-out infinite;}
    .ripple span:nth-child(2){animation-delay:.5s;border-color:#ff6584;}
    .ripple span:nth-child(3){animation-delay:1s;border-color:#43e97b;}
    @keyframes rippleAnim{0%{transform:scale(0);opacity:1;}100%{transform:scale(2);opacity:0;}}
  </style>
</head>
<body>
  <h1>CSS <span>Loading Animations</span></h1>
  <p class="subtitle">9 pure CSS loading animations — no JavaScript required</p>
  <div class="grid">
    <div class="card"><div class="loader-wrap"><div class="spinner"></div></div><div class="card-label">Spinner</div></div>
    <div class="card"><div class="loader-wrap"><div class="pulse"></div></div><div class="card-label">Pulse</div></div>
    <div class="card"><div class="loader-wrap"><div class="dots"><span></span><span></span><span></span></div></div><div class="card-label">Dots</div></div>
    <div class="card"><div class="loader-wrap"><div class="bars"><span></span><span></span><span></span><span></span><span></span></div></div><div class="card-label">Bars</div></div>
    <div class="card"><div class="loader-wrap"><div class="ring"></div></div><div class="card-label">Ring</div></div>
    <div class="card"><div class="loader-wrap"><div class="bounce"><span></span><span></span><span></span></div></div><div class="card-label">Bounce</div></div>
    <div class="card"><div class="loader-wrap"><div class="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div><div class="card-label">Wave</div></div>
    <div class="card"><div class="loader-wrap" style="height:auto;padding:.5rem 0;"><div class="skeleton"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div></div><div class="card-label">Skeleton</div></div>
    <div class="card"><div class="loader-wrap"><div class="ripple"><span></span><span></span><span></span></div></div><div class="card-label">Ripple</div></div>
  </div>
</body>
</html>
